<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllCotton</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --page-bg:#eef3fb;
    --window:#ffffff;
    --border:#dde6f2;
    --coral:#ffb2a6;
    --coral-deep:#ee8f83;
    --rose:#c98fa0;
    --blue:#a9c8ea;
    --blue-deep:#5b7fa6;
    --text-main:#4a4550;
    --text-sub:#9b96a3;
    --row-line:#eef1f7;
    --shadow: 0 14px 40px rgba(90,110,150,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'Noto Sans KR', sans-serif;
    color:var(--text-main);
    background:var(--page-bg);
    display:flex;
    justify-content:center;
    padding:40px 16px 60px;
    -webkit-tap-highlight-color:transparent;
  }

  .window{
    width:100%;
    max-width:600px;
    background:var(--window);
    border:1px solid var(--border);
    border-radius:18px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  /* ---------- title bar ---------- */
  .title-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px;
    border-bottom:1px solid var(--border);
  }
  .site-title{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    font-weight:600;
    color:var(--rose);
    outline:none;
    letter-spacing:0.3px;
  }
  .title-icons{display:flex; gap:6px;}
  .title-icons button{
    width:24px;height:24px;
    border:1px solid var(--border);
    background:#fff;
    border-radius:6px;
    font-size:11px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    color:var(--text-sub);
    transition:transform .15s ease;
  }
  .title-icons button:hover{transform:translateY(-1px);}
  .title-icons button.syncing{opacity:0.5;}

  /* ---------- tabs ---------- */
  .tabs{
    display:flex;
    gap:4px;
    padding:0 14px;
    border-bottom:1px solid var(--border);
  }
  .tab-btn{
    border:none;
    background:none;
    padding:12px 12px;
    font-size:13px;
    color:var(--text-sub);
    cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .tab-btn.active{
    color:var(--text-main);
    font-weight:700;
    border-bottom-color:var(--blue);
  }

  .pane{padding:26px 24px 30px;}

  /* ---------- profile pane ---------- */
  .profile-content{display:block;}
  @media (min-width:600px){
    .profile-content{display:flex; gap:34px; align-items:flex-start;}
    .avatar-col{width:170px; flex-shrink:0;}
    .info-col{flex:1; min-width:0;}
  }
  .avatar-col{text-align:center; margin-bottom:22px;}
  @media (min-width:600px){ .avatar-col{margin-bottom:0;} }
  .avatar{
    width:120px;height:120px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--coral),var(--blue));
    display:flex;align-items:center;justify-content:center;
    font-size:40px;
    color:#fff;
    margin:0 auto 14px;
    cursor:pointer;
    background-size:cover;
    background-position:center;
    border:4px solid #fff;
    box-shadow:0 6px 18px rgba(90,110,150,0.18);
    overflow:hidden;
  }
  .profile-name{
    font-family:'Gaegu', sans-serif;
    font-size:24px;
    font-weight:700;
    color:var(--coral-deep);
    outline:none;
  }
  .profile-tag{
    font-size:12px;
    color:var(--rose);
    outline:none;
    margin-top:4px;
  }

  .divider-line{border:none; border-top:1px solid var(--row-line); margin:18px 0;}

  .row{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:8px 0;
    font-size:13px;
  }
  .row-label{
    width:78px;
    flex-shrink:0;
    color:var(--text-sub);
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    outline:none;
  }
  .row-colon{color:var(--text-sub); flex-shrink:0;}
  .row-value{
    flex:1;
    outline:none;
    line-height:1.5;
    word-break:break-word;
  }
  .row-controls{
    display:none;
    gap:3px;
    flex-shrink:0;
  }
  body.edit-mode .row-controls{display:flex;}
  .row-controls button{
    border:none;background:var(--page-bg);color:var(--text-sub);
    width:20px;height:20px;border-radius:6px;font-size:9px;cursor:pointer;
  }
  .row-controls button:disabled{opacity:0.3;}
  .row-controls .row-del{color:var(--coral-deep);}
  .add-row-btn{
    display:none;
    width:100%;
    border:1px dashed var(--border);
    background:none;
    color:var(--text-sub);
    border-radius:10px;
    padding:8px;
    font-size:12px;
    cursor:pointer;
    margin-top:6px;
  }
  body.edit-mode .add-row-btn{display:block;}

  /* ---------- status segments ---------- */
  .status-segments{display:flex; gap:4px; margin-top:2px;}
  .status-seg{
    width:18px;height:8px;
    border-radius:3px;
    background:var(--row-line);
    cursor:default;
  }
  .status-seg.filled{background:var(--blue-deep);}
  body.edit-mode .status-seg{cursor:pointer;}

  /* ---------- link rows ---------- */
  .link-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    background:var(--page-bg);
    border-radius:12px;
    padding:12px;
    margin-bottom:8px;
    text-decoration:none;
    color:var(--blue-deep);
    font-size:13px;
    font-weight:700;
    position:relative;
    transition:background .15s ease;
  }
  .link-row:hover{background:#e2ecfa;}
  .link-row .link-del{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    border:none;background:none;color:var(--text-sub);font-size:12px;
    cursor:pointer; display:none;
  }
  body.edit-mode .link-row .link-del{display:block;}
  .add-link-row{
    border:1px dashed var(--border);
    color:var(--text-sub);
    background:none;
    display:none;
    width:100%;
    cursor:pointer;
  }
  body.edit-mode .add-link-row{display:flex;}

  /* ---------- album pane ---------- */
  .album-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .album-photo{
    position:relative;
    aspect-ratio:1;
    border-radius:10px;
    overflow:hidden;
    background:var(--page-bg);
  }
  .album-photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .album-del{
    position:absolute;top:4px;right:4px;
    width:18px;height:18px;
    border:none;border-radius:50%;
    background:rgba(74,69,80,0.55);
    color:#fff;
    font-size:10px;
    cursor:pointer;
    display:none;
    align-items:center;justify-content:center;
  }
  body.edit-mode .album-del{display:flex;}
  .album-add{
    aspect-ratio:1;
    border-radius:10px;
    border:1px dashed var(--border);
    background:none;
    color:var(--text-sub);
    font-size:22px;
    cursor:pointer;
    display:none;
    align-items:center;justify-content:center;
  }
  body.edit-mode .album-add{display:flex;}
  .album-empty{
    grid-column:1 / -1;
    font-size:12px;
    color:var(--text-sub);
    text-align:center;
    padding:20px 0;
  }

  /* ---------- music pane ---------- */
  .music-frame{border-radius:12px; overflow:hidden;}
  .music-frame iframe{display:block;width:100%;height:180px;border:none;}
  .music-btn{
    margin-top:10px;
    width:100%;
    border:none;
    background:var(--page-bg);
    color:var(--text-main);
    padding:10px;
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
  }

  footer{
    text-align:center;
    font-size:9px;
    letter-spacing:2px;
    color:var(--text-sub);
    padding:14px 0 4px;
    text-transform:uppercase;
    opacity:0.6;
  }

  body.edit-mode [contenteditable="true"]{
    outline:1px dashed var(--coral-deep);
    outline-offset:2px;
    border-radius:4px;
  }
  body.edit-mode .avatar{box-shadow:0 6px 18px rgba(90,110,150,0.18), 0 0 0 3px var(--coral-deep);}
</style>
</head>
<body>

<div class="window">

  <div class="title-bar">
    <div class="site-title" contenteditable="false" id="siteTitle">allcotton-profile</div>
    <div class="title-icons">
      <button id="syncStatus" title="동기화 상태">☁</button>
      <button id="editToggle" title="편집 모드">✎</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="profile">Profile</button>
    <button class="tab-btn" data-tab="album">Album</button>
    <button class="tab-btn" data-tab="music">Music</button>
  </div>

  <div class="pane" id="paneProfile">
    <div class="profile-content">
      <div class="avatar-col">
        <div class="avatar" id="avatar" title="탭해서 사진 바꾸기">🌱</div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;">
        <div class="profile-name" contenteditable="false" id="profileName">som*.</div>
        <div class="profile-tag" contenteditable="false" id="profileTag">소요도서관 사서 🐣</div>
      </div>
      <div class="info-col">
        <hr class="divider-line">
        <div id="infoRows"></div>
        <button class="add-row-btn" id="addRowBtn">+ 항목 추가</button>

        <div class="row">
          <div class="row-label">Status</div>
          <div class="row-colon">:</div>
          <div class="status-segments" id="statusSegments"></div>
        </div>

        <hr class="divider-line">
        <div id="linkRows"></div>
        <button class="link-row add-link-row" id="addLinkRow">+ 링크 추가</button>
      </div>
    </div>
  </div>

  <div class="pane" id="paneAlbum" style="display:none;">
    <div class="album-grid" id="albumGrid"></div>
    <input type="file" id="albumInput" accept="image/*" style="display:none;">
  </div>

  <div class="pane" id="paneMusic" style="display:none;">
    <div class="music-frame">
      <iframe id="musicFrame" src="https://www.youtube.com/embed/jfKfPfyJRdk" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <button class="music-btn" id="musicBtn">🎶 노래 바꾸기</button>
  </div>

  <footer>allcotton</footer>
</div>

<!-- Firebase (compat SDK, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAP4dInezoBrbUF7p0r1aP80pqcclg0EgQ",
  authDomain: "sometudio.firebaseapp.com",
  databaseURL: "https://sometudio-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sometudio",
  storageBucket: "sometudio.firebasestorage.app",
  messagingSenderId: "861527247257",
  appId: "1:861527247257:web:88cee094a9082eee12ab08"
};

const DOC_ID = "shasha";
let db = null, docRef = null, isFirebaseReady = false;
try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  docRef = db.collection('webhub').doc(DOC_ID);
  isFirebaseReady = true;
}catch(e){ console.warn('Firebase 초기화 실패. localStorage만 사용합니다.', e); }

const syncBtn = document.getElementById('syncStatus');
function setSyncStatus(state){
  if(!syncBtn) return;
  syncBtn.classList.toggle('syncing', state === 'syncing');
  if(state === 'synced'){ syncBtn.textContent = '☁'; syncBtn.title = '동기화됨'; }
  else if(state === 'offline'){ syncBtn.textContent = '⚠'; syncBtn.title = 'Firebase 미설정 - 이 기기에만 저장됨'; }
  else if(state === 'error'){ syncBtn.textContent = '!'; syncBtn.title = '동기화 오류'; }
  else { syncBtn.title = '저장 중...'; }
}
setSyncStatus(isFirebaseReady ? 'synced' : 'offline');

let syncTimer = null, applyingRemote = false;
const store = {
  get(key, fallback){
    try{ const v = localStorage.getItem(key); return v === null ? fallback : JSON.parse(v); }
    catch(e){ return fallback; }
  },
  set(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
    if(!applyingRemote) queueCloudSave(key, val);
  }
};
function queueCloudSave(key, val){
  if(!isFirebaseReady) return;
  setSyncStatus('syncing');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>{
    docRef.set({ [key]: val }, { merge:true })
      .then(()=> setSyncStatus('synced'))
      .catch(err=>{ console.error(err); setSyncStatus('error'); });
  }, 500);
}
function startCloudSync(){
  if(!isFirebaseReady) return;
  docRef.onSnapshot((snap)=>{
    if(!snap.exists) return;
    if(snap.metadata.hasPendingWrites) return;
    applyingRemote = true;
    const data = snap.data();
    Object.keys(data).forEach(k=>{ try{ localStorage.setItem(k, JSON.stringify(data[k])); }catch(e){} });
    hydrateUI();
    applyingRemote = false;
    setSyncStatus('synced');
  }, (err)=>{ console.error(err); setSyncStatus('error'); });
}

function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ---------- tabs ---------- */
const tabBtns = document.querySelectorAll('.tab-btn');
const panes = { profile: document.getElementById('paneProfile'), album: document.getElementById('paneAlbum'), music: document.getElementById('paneMusic') };
tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    Object.keys(panes).forEach(k=> panes[k].style.display = (k === btn.dataset.tab) ? 'block' : 'none');
  });
});

/* ---------- edit mode ---------- */
const editables = ['siteTitle','profileName','profileTag'];
const editToggle = document.getElementById('editToggle');
let editMode = false;
function applyEditState(){
  document.body.classList.toggle('edit-mode', editMode);
  editables.forEach(id=> document.getElementById(id).setAttribute('contenteditable', editMode ? 'true' : 'false'));
  editToggle.textContent = editMode ? '✓' : '✎';
  renderRows();
  renderAlbum();
  renderLinkRows();
  renderStatus();
}
editToggle.addEventListener('click', ()=>{ editMode = !editMode; applyEditState(); });
editables.forEach(id=>{
  const el = document.getElementById(id);
  el.addEventListener('blur', ()=> store.set('wh_'+id, el.textContent));
});

/* ---------- avatar ---------- */
const avatar = document.getElementById('avatar');
const avatarInput = document.getElementById('avatarInput');
function loadAvatar(){
  const saved = store.get('wh_avatar', null);
  if(saved){ avatar.style.backgroundImage = `url(${saved})`; avatar.textContent = ''; }
}
avatar.addEventListener('click', ()=>{ if(editMode) avatarInput.click(); });
avatarInput.addEventListener('change', async ()=>{
  const file = avatarInput.files[0];
  if(!file) return;
  const dataUrl = await compressImage(file, 400, 0.8);
  avatar.style.backgroundImage = `url(${dataUrl})`;
  avatar.textContent = '';
  store.set('wh_avatar', dataUrl);
});

/* ---------- info rows ---------- */
const DEFAULT_ROWS = [
  {label:'Motto', value:'천천히, 그렇지만 꾸준히'},
  {label:'Keywords', value:'#도서관 #만들기 #ADHD'},
  {label:'Field', value:'Library × Craft × Code'}
];
const infoRowsEl = document.getElementById('infoRows');
function getRows(){ return store.get('wh_infoBlocks', DEFAULT_ROWS); }
function setRows(arr){ store.set('wh_infoBlocks', arr); }
function renderRows(){
  const rows = getRows();
  infoRowsEl.innerHTML = '';
  rows.forEach((r, idx)=>{
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML = `
      <div class="row-label" contenteditable="${editMode?'true':'false'}"></div>
      <div class="row-colon">:</div>
      <div class="row-value" contenteditable="${editMode?'true':'false'}"></div>
      <div class="row-controls">
        <button class="row-up" ${idx===0?'disabled':''}>▲</button>
        <button class="row-down" ${idx===rows.length-1?'disabled':''}>▼</button>
        <button class="row-del">✕</button>
      </div>
    `;
    div.querySelector('.row-label').textContent = r.label;
    div.querySelector('.row-value').textContent = r.value;
    div.querySelector('.row-label').addEventListener('blur', e=>{ const a=getRows(); a[idx].label=e.target.textContent; setRows(a); });
    div.querySelector('.row-value').addEventListener('blur', e=>{ const a=getRows(); a[idx].value=e.target.textContent; setRows(a); });
    div.querySelector('.row-up').addEventListener('click', ()=>{ const a=getRows(); if(idx===0)return; [a[idx-1],a[idx]]=[a[idx],a[idx-1]]; setRows(a); renderRows(); });
    div.querySelector('.row-down').addEventListener('click', ()=>{ const a=getRows(); if(idx===a.length-1)return; [a[idx+1],a[idx]]=[a[idx],a[idx+1]]; setRows(a); renderRows(); });
    div.querySelector('.row-del').addEventListener('click', ()=>{ const a=getRows(); a.splice(idx,1); setRows(a); renderRows(); });
    infoRowsEl.appendChild(div);
  });
}
document.getElementById('addRowBtn').addEventListener('click', ()=>{
  const label = prompt('항목 이름을 입력하세요 (예: Field)');
  if(!label) return;
  const value = prompt('내용을 입력하세요') || '';
  const a = getRows(); a.push({label, value}); setRows(a); renderRows();
});

/* ---------- status segments ---------- */
const statusEl = document.getElementById('statusSegments');
function getStatus(){ return store.get('wh_statusLevel', 3); }
function setStatus(v){ store.set('wh_statusLevel', v); }
function renderStatus(){
  const level = getStatus();
  statusEl.innerHTML = '';
  for(let i=1;i<=5;i++){
    const seg = document.createElement('div');
    seg.className = 'status-seg' + (i <= level ? ' filled' : '');
    seg.addEventListener('click', ()=>{ if(!editMode) return; setStatus(i); renderStatus(); });
    statusEl.appendChild(seg);
  }
}

/* ---------- link rows ---------- */
const linkRowsEl = document.getElementById('linkRows');
const defaultLinks = [
  {emoji:'💬', label:'Discord', url:'#'},
  {emoji:'🐦', label:'Twitter', url:'#'}
];
function getLinks(){ return store.get('wh_links', defaultLinks); }
function setLinks(arr){ store.set('wh_links', arr); }
function renderLinkRows(){
  const links = getLinks();
  linkRowsEl.innerHTML = '';
  links.forEach((link, idx)=>{
    const a = document.createElement('a');
    a.className = 'link-row';
    a.href = link.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = `<span>${link.emoji}</span><span>${link.label}</span><button class="link-del">✕</button>`;
    a.querySelector('.link-del').addEventListener('click', (e)=>{
      e.preventDefault(); e.stopPropagation();
      const arr = getLinks(); arr.splice(idx,1); setLinks(arr); renderLinkRows();
    });
    linkRowsEl.appendChild(a);
  });
}
document.getElementById('addLinkRow').addEventListener('click', ()=>{
  const emoji = prompt('아이콘 이모지를 입력하세요', '🔗') || '🔗';
  const label = prompt('링크 이름을 입력하세요 (예: 인스타그램)');
  if(!label) return;
  const url = prompt('링크 주소를 입력하세요 (https:// 포함)');
  if(!url) return;
  const arr = getLinks(); arr.push({emoji,label,url}); setLinks(arr); renderLinkRows();
});

/* ---------- album ---------- */
const albumGrid = document.getElementById('albumGrid');
const albumInput = document.getElementById('albumInput');
const MAX_PHOTOS = 6;
function getAlbum(){ return store.get('wh_album', []); }
function setAlbum(arr){ store.set('wh_album', arr); }
function renderAlbum(){
  const photos = getAlbum();
  albumGrid.innerHTML = '';
  if(photos.length === 0 && !editMode){
    const hint = document.createElement('div');
    hint.className = 'album-empty';
    hint.textContent = '아직 등록된 사진이 없어요';
    albumGrid.appendChild(hint);
  }
  photos.forEach((src, idx)=>{
    const box = document.createElement('div');
    box.className = 'album-photo';
    box.innerHTML = `<img src="${src}" alt="album photo"><button class="album-del" title="삭제">✕</button>`;
    box.querySelector('.album-del').addEventListener('click', ()=>{
      const arr = getAlbum(); arr.splice(idx,1); setAlbum(arr); renderAlbum();
    });
    albumGrid.appendChild(box);
  });
  if(editMode && photos.length < MAX_PHOTOS){
    const addBtn = document.createElement('button');
    addBtn.className = 'album-add';
    addBtn.textContent = '+';
    addBtn.title = `최대 ${MAX_PHOTOS}장까지 등록할 수 있어요`;
    addBtn.addEventListener('click', ()=> albumInput.click());
    albumGrid.appendChild(addBtn);
  }
}
albumInput.addEventListener('change', async ()=>{
  const file = albumInput.files[0];
  if(!file) return;
  const arr = getAlbum();
  if(arr.length >= MAX_PHOTOS){ alert(`사진은 최대 ${MAX_PHOTOS}장까지만 등록할 수 있어요`); return; }
  const dataUrl = await compressImage(file, 700, 0.72);
  arr.push(dataUrl); setAlbum(arr); renderAlbum();
  albumInput.value = '';
});

/* ---------- music ---------- */
const musicFrame = document.getElementById('musicFrame');
function extractYoutubeId(url){ const m = url.match(/(?:youtu\.be\/|v=|embed\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : null; }
function loadMusic(){ const savedId = store.get('wh_musicId', null); if(savedId) musicFrame.src = `https://www.youtube.com/embed/${savedId}`; }
document.getElementById('musicBtn').addEventListener('click', ()=>{
  const url = prompt('유튜브 링크를 붙여넣어주세요 🎵');
  if(!url) return;
  const id = extractYoutubeId(url);
  if(!id){ alert('유튜브 링크를 확인해주세요!'); return; }
  musicFrame.src = `https://www.youtube.com/embed/${id}`;
  store.set('wh_musicId', id);
});

/* ---------- hydrate ---------- */
function hydrateUI(){
  editables.forEach(id=>{
    const el = document.getElementById(id);
    const saved = store.get('wh_'+id, null);
    if(saved !== null) el.textContent = saved;
  });
  loadAvatar();
  loadMusic();
  renderRows();
  renderStatus();
  renderLinkRows();
  renderAlbum();
}
hydrateUI();
startCloudSync();
</script>
</body>
</html>
