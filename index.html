<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllCotton</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#fff7f0;
    --card:#ffffff;
    --coral:#ffb2a6;
    --coral-deep:#ff9587;
    --lavender:#c9b6ec;
    --lavender-deep:#ab8fe0;
    --mint:#aee3d3;
    --mint-deep:#7dd0b7;
    --yellow:#ffe29a;
    --text-main:#5b4b4e;
    --text-sub:#a4949a;
    --line:#f0e4ea;
    --shadow: 0 8px 24px rgba(91,75,78,0.10);
    --shadow-soft: 0 4px 14px rgba(91,75,78,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'Noto Sans KR', sans-serif;
    color:var(--text-main);
    background:#ffffff;
    overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .blob{
    position:fixed;
    border-radius:50%;
    filter:blur(2px);
    opacity:0.3;
    z-index:0;
    animation:float 16s ease-in-out infinite;
  }
  .blob1{width:150px;height:150px;background:var(--coral);top:-40px;right:-50px;animation-delay:0s;}
  .blob2{width:120px;height:120px;background:var(--mint);bottom:20%;left:-50px;animation-delay:4s;}
  .blob3{width:90px;height:90px;background:var(--yellow);bottom:-30px;right:15%;animation-delay:2s;}
  @keyframes float{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-18px) rotate(8deg);}
  }
  @media (prefers-reduced-motion: reduce){ .blob{animation:none;} .reveal{transition:none !important; opacity:1 !important; transform:none !important;} }

  header{
    position:sticky;
    top:0;
    z-index:10;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(8px);
  }
  .site-title{
    font-family:'Gaegu', sans-serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--text-sub);
    outline:none;
  }
  .header-right{display:flex;align-items:center;}
  .sync-status{
    font-size:12px;
    background:var(--card);
    width:30px;height:30px;
    display:flex;align-items:center;justify-content:center;
    border-radius:50%;
    box-shadow:var(--shadow-soft);
    margin-right:8px;
    transition:opacity .2s ease;
  }
  .sync-status.syncing{opacity:0.5;}
  .edit-toggle{
    border:none;
    background:var(--card);
    width:34px;height:34px;
    border-radius:50%;
    box-shadow:var(--shadow-soft);
    font-size:15px;
    cursor:pointer;
    transition:transform .15s ease;
  }
  .edit-toggle:hover{transform:scale(1.08) rotate(-8deg);}

  .wrap{
    position:relative;
    z-index:1;
    max-width:420px;
    margin:0 auto;
    padding:20px 24px 70px;
  }

  /* ---------- desktop: side-by-side ---------- */
  @media (min-width:840px){
    .wrap{
      max-width:820px;
      display:grid;
      grid-template-columns:300px 1fr;
      gap:48px;
      align-items:start;
      padding-top:36px;
    }
    .sidebar{position:sticky; top:96px;}
  }

  .reveal{
    opacity:0;
    transform:translateY(18px);
    transition:opacity .6s ease, transform .6s ease;
  }
  .reveal.in-view{opacity:1; transform:translateY(0);}

  /* ---------- hero ---------- */
  .hero{
    text-align:center;
    padding:34px 0 26px;
  }
  @media (min-width:840px){ .hero{padding-top:0;} }
  .avatar{
    width:128px;height:128px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--coral),var(--lavender));
    display:flex;align-items:center;justify-content:center;
    font-size:44px;
    color:#fff;
    margin:0 auto 18px;
    cursor:pointer;
    background-size:cover;
    background-position:center;
    border:5px solid #fff;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .profile-name{
    font-family:'Gaegu', sans-serif;
    font-size:32px;
    font-weight:700;
    outline:none;
  }
  .profile-tag{
    font-size:13px;
    color:#fff;
    background:var(--coral-deep);
    padding:6px 16px;
    border-radius:20px;
    margin:10px 0 16px;
    outline:none;
    display:inline-block;
  }
  .profile-intro{
    font-size:14px;
    color:var(--text-sub);
    line-height:1.7;
    outline:none;
    max-width:300px;
    margin:0 auto;
  }

  .divider{
    text-align:center;
    color:var(--line);
    letter-spacing:8px;
    font-size:12px;
    margin:8px 0 26px;
  }

  /* ---------- mini album ---------- */
  .section{margin-bottom:34px;}
  .section-title{
    font-family:'Gaegu', sans-serif;
    font-size:18px;
    font-weight:700;
    text-align:center;
    margin-bottom:14px;
  }
  .album-strip{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:2px 2px 10px;
    scroll-snap-type:x proximity;
  }
  .album-strip::-webkit-scrollbar{height:5px;}
  .album-strip::-webkit-scrollbar-thumb{background:var(--line); border-radius:10px;}
  .album-photo{
    position:relative;
    flex:0 0 auto;
    width:110px;height:110px;
    border-radius:18px;
    overflow:hidden;
    background:var(--bg-1);
    box-shadow:var(--shadow-soft);
    scroll-snap-align:start;
  }
  .album-photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .album-del{
    position:absolute;top:4px;right:4px;
    width:20px;height:20px;
    border:none;border-radius:50%;
    background:rgba(91,75,78,0.55);
    color:#fff;
    font-size:11px;
    cursor:pointer;
    display:none;
    align-items:center;justify-content:center;
  }
  body.edit-mode .album-del{display:flex;}
  .album-add{
    flex:0 0 auto;
    width:110px;height:110px;
    border-radius:18px;
    border:1.5px dashed var(--line);
    background:none;
    color:var(--text-sub);
    font-size:24px;
    cursor:pointer;
    display:none;
    align-items:center;justify-content:center;
  }
  body.edit-mode .album-add{display:flex;}
  .album-empty{
    font-size:12px;
    color:var(--text-sub);
    text-align:center;
    padding:14px 0;
  }

  /* ---------- info blocks ---------- */
  .info-block{
    background:var(--card);
    border-radius:22px;
    box-shadow:var(--shadow-soft);
    padding:18px 20px;
    margin-bottom:14px;
    display:flex;
    gap:14px;
    align-items:flex-start;
  }
  .info-block .icon{
    font-size:22px;
    flex-shrink:0;
    width:36px;height:36px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:default;
  }
  body.edit-mode .info-block .icon{cursor:pointer;}
  .icon-c0{background:rgba(255,178,166,0.25);}
  .icon-c1{background:rgba(174,227,211,0.35);}
  .icon-c2{background:rgba(255,226,154,0.4);}
  .icon-c3{background:rgba(201,182,236,0.3);}
  .info-block .body{flex:1;min-width:0;}
  .info-block .label{
    font-size:11px;
    color:var(--lavender-deep);
    font-weight:700;
    margin-bottom:4px;
    outline:none;
  }
  .info-block .value{
    font-size:14px;
    outline:none;
    line-height:1.5;
    word-break:break-word;
  }
  .info-block .block-controls{
    display:none;
    flex-direction:column;
    gap:4px;
    flex-shrink:0;
  }
  body.edit-mode .info-block .block-controls{display:flex;}
  .block-controls button{
    border:none;background:var(--bg-1);color:var(--text-sub);
    width:22px;height:22px;border-radius:7px;font-size:10px;cursor:pointer;
  }
  .block-controls button:disabled{opacity:0.3;cursor:default;}
  .block-controls .block-del{color:var(--coral-deep);}
  .add-block-btn{
    display:none;
    width:100%;
    border:1.5px dashed var(--line);
    background:none;
    color:var(--text-sub);
    border-radius:22px;
    padding:14px;
    font-size:13px;
    cursor:pointer;
  }
  body.edit-mode .add-block-btn{display:block;}

  /* ---------- quote ---------- */
  .quote-block{
    text-align:center;
    padding:34px 10px 10px;
  }
  .quote-mark{
    font-family:'Gaegu', sans-serif;
    font-size:40px;
    color:var(--coral);
    line-height:0.5;
    display:block;
    margin-bottom:6px;
  }
  .quote{
    font-family:'Gaegu', sans-serif;
    font-size:19px;
    color:var(--text-main);
    outline:none;
    line-height:1.6;
  }

  /* ---------- music / links ---------- */
  .music-frame{
    border-radius:18px;
    overflow:hidden;
    box-shadow:var(--shadow-soft);
  }
  .music-frame iframe{display:block;width:100%;height:180px;border:none;}
  .music-btn{
    margin-top:10px;
    width:100%;
    border:none;
    background:var(--bg-1);
    color:var(--text-main);
    padding:11px;
    border-radius:14px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
  }
  .link-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
  .link-chip{
    position:relative;
    display:flex;flex-direction:column;align-items:center;gap:5px;
    background:var(--card);
    box-shadow:var(--shadow-soft);
    border-radius:18px;
    padding:16px 6px;
    text-decoration:none;
    color:var(--text-main);
    font-size:11px;
    font-weight:700;
    text-align:center;
    cursor:pointer;
    transition:transform .12s ease;
  }
  .link-chip:hover{transform:translateY(-2px);}
  .link-emoji{font-size:24px;}
  .link-del{
    position:absolute;top:2px;right:4px;
    border:none;background:none;font-size:11px;color:var(--text-sub);
    cursor:pointer;display:none;
  }
  body.edit-mode .link-del{display:block;}
  .link-add{
    border:1.5px dashed var(--line);
    background:none;
    color:var(--text-sub);
    box-shadow:none;
    display:none;
  }
  body.edit-mode .link-add{display:flex;}

  footer{
    text-align:center;
    font-size:11px;
    color:var(--text-sub);
    margin-top:40px;
  }
  @media (min-width:840px){ footer{grid-column:1 / -1;} }

  body.edit-mode [contenteditable="true"]{
    outline:1.5px dashed var(--coral);
    outline-offset:3px;
    border-radius:6px;
    background:rgba(255,178,166,0.06);
  }
  body.edit-mode .avatar{box-shadow:var(--shadow), 0 0 0 3px var(--coral);}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<header>
  <div class="site-title" contenteditable="false" id="siteTitle">AllCotton</div>
  <div class="header-right">
    <div class="sync-status" id="syncStatus" title="동기화 상태">☁️</div>
    <button class="edit-toggle" id="editToggle" title="편집 모드">✏️</button>
  </div>
</header>

<div class="wrap">

  <div class="sidebar">
    <div class="hero reveal">
      <div class="avatar" id="avatar" title="탭해서 사진 바꾸기">🌱</div>
      <input type="file" id="avatarInput" accept="image/*" style="display:none;">
      <div class="profile-name" contenteditable="false" id="profileName">샤샤</div>
      <div class="profile-tag" contenteditable="false" id="profileTag">🐣 소요도서관 사서</div>
      <div class="profile-intro" contenteditable="false" id="profileIntro">오늘도 도서관에서 책과 함께 하루를 보내는 중 🌿</div>
    </div>

    <div class="quote-block reveal">
      <span class="quote-mark">"</span>
      <div class="quote" contenteditable="false" id="quote">오늘도 잘 살아냈다 🤍</div>
    </div>
  </div>

  <div class="main-content">

    <div class="section reveal">
      <div class="section-title">📷 미니 앨범</div>
      <div class="album-strip" id="albumStrip"></div>
      <input type="file" id="albumInput" accept="image/*" style="display:none;">
    </div>

    <div class="divider reveal">· · ·</div>

    <div class="section reveal" id="infoSection">
      <div id="infoBlocksContainer"></div>
      <button class="add-block-btn" id="addBlockBtn">+ 항목 추가</button>
    </div>

    <div class="section reveal">
      <div class="section-title">🎵 지금 듣는 노래</div>
      <div class="music-frame">
        <iframe id="musicFrame" src="https://www.youtube.com/embed/jfKfPfyJRdk" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
      <button class="music-btn" id="musicBtn">🎶 노래 바꾸기</button>
    </div>

    <div class="section reveal">
      <div class="section-title">🔗 자주 가는 곳</div>
      <div class="link-grid" id="linkGrid"></div>
    </div>

  </div>

  <footer>edit 모드(✏️)를 눌러서 자유롭게 커스텀해보세요</footer>
</div>

<!-- Firebase (compat SDK, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAP4dInezoBrbUF7p0r1aP80pqcclg0EgQ",
  authDomain: "sometudio.firebaseapp.com",
  databaseURL: "https://sometudio-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sometudio",
  storageBucket: "sometudio.firebasestorage.app",
  messagingSenderId: "861527247257",
  appId: "1:861527247257:web:88cee094a9082eee12ab08"
};

const DOC_ID = "shasha";
let db = null, docRef = null, isFirebaseReady = false;

try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  docRef = db.collection('webhub').doc(DOC_ID);
  isFirebaseReady = true;
}catch(e){
  console.warn('Firebase 초기화 실패. 브라우저 저장(localStorage)만 사용합니다.', e);
}

const syncStatusEl = document.getElementById('syncStatus');
function setSyncStatus(state){
  if(!syncStatusEl) return;
  if(state === 'syncing'){ syncStatusEl.classList.add('syncing'); syncStatusEl.title = '저장 중...'; }
  else if(state === 'synced'){ syncStatusEl.textContent = '☁️'; syncStatusEl.classList.remove('syncing'); syncStatusEl.title = '동기화됨'; }
  else if(state === 'offline'){ syncStatusEl.textContent = '📴'; syncStatusEl.classList.remove('syncing'); syncStatusEl.title = 'Firebase 미설정 - 이 기기에만 저장됨'; }
  else if(state === 'error'){ syncStatusEl.textContent = '⚠️'; syncStatusEl.classList.remove('syncing'); syncStatusEl.title = '동기화 오류'; }
}
setSyncStatus(isFirebaseReady ? 'synced' : 'offline');

let syncTimer = null;
let applyingRemote = false;

const store = {
  get(key, fallback){
    try{ const v = localStorage.getItem(key); return v === null ? fallback : JSON.parse(v); }
    catch(e){ return fallback; }
  },
  set(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
    if(!applyingRemote) queueCloudSave(key, val);
  }
};

function queueCloudSave(key, val){
  if(!isFirebaseReady) return;
  setSyncStatus('syncing');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>{
    docRef.set({ [key]: val }, { merge:true })
      .then(()=> setSyncStatus('synced'))
      .catch(err=>{ console.error(err); setSyncStatus('error'); });
  }, 500);
}

function startCloudSync(){
  if(!isFirebaseReady) return;
  docRef.onSnapshot((snap)=>{
    if(!snap.exists) return;
    if(snap.metadata.hasPendingWrites) return;
    applyingRemote = true;
    const data = snap.data();
    Object.keys(data).forEach(k=>{
      try{ localStorage.setItem(k, JSON.stringify(data[k])); }catch(e){}
    });
    hydrateUI();
    applyingRemote = false;
    setSyncStatus('synced');
  }, (err)=>{ console.error(err); setSyncStatus('error'); });
}

/* ---------- image compression helper ---------- */
function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ---------- edit mode ---------- */
const editables = ['siteTitle','profileName','profileTag','profileIntro','quote'];
const editToggle = document.getElementById('editToggle');
let editMode = false;
function applyEditState(){
  document.body.classList.toggle('edit-mode', editMode);
  editables.forEach(id=>{
    document.getElementById(id).setAttribute('contenteditable', editMode ? 'true' : 'false');
  });
  editToggle.textContent = editMode ? '✅' : '✏️';
  renderBlocks();
  renderAlbum();
}
editToggle.addEventListener('click', ()=>{ editMode = !editMode; applyEditState(); });
editables.forEach(id=>{
  const el = document.getElementById(id);
  el.addEventListener('blur', ()=> store.set('wh_'+id, el.textContent));
});

/* ---------- avatar photo ---------- */
const avatar = document.getElementById('avatar');
const avatarInput = document.getElementById('avatarInput');
function loadAvatar(){
  const saved = store.get('wh_avatar', null);
  if(saved){ avatar.style.backgroundImage = `url(${saved})`; avatar.textContent = ''; }
}
avatar.addEventListener('click', ()=>{ if(editMode) avatarInput.click(); });
avatarInput.addEventListener('change', async ()=>{
  const file = avatarInput.files[0];
  if(!file) return;
  const dataUrl = await compressImage(file, 400, 0.8);
  avatar.style.backgroundImage = `url(${dataUrl})`;
  avatar.textContent = '';
  store.set('wh_avatar', dataUrl);
});

/* ---------- mini album ---------- */
const albumStrip = document.getElementById('albumStrip');
const albumInput = document.getElementById('albumInput');
const MAX_PHOTOS = 6;
function getAlbum(){ return store.get('wh_album', []); }
function setAlbum(arr){ store.set('wh_album', arr); }
function renderAlbum(){
  const photos = getAlbum();
  albumStrip.innerHTML = '';
  if(photos.length === 0 && !editMode){
    const hint = document.createElement('div');
    hint.className = 'album-empty';
    hint.textContent = '아직 등록된 사진이 없어요';
    albumStrip.appendChild(hint);
  }
  photos.forEach((src, idx)=>{
    const box = document.createElement('div');
    box.className = 'album-photo';
    box.innerHTML = `<img src="${src}" alt="album photo"><button class="album-del" title="삭제">✕</button>`;
    box.querySelector('.album-del').addEventListener('click', ()=>{
      const arr = getAlbum();
      arr.splice(idx,1);
      setAlbum(arr);
      renderAlbum();
    });
    albumStrip.appendChild(box);
  });
  if(editMode && photos.length < MAX_PHOTOS){
    const addBtn = document.createElement('button');
    addBtn.className = 'album-add';
    addBtn.textContent = '+';
    addBtn.title = `최대 ${MAX_PHOTOS}장까지 등록할 수 있어요`;
    addBtn.addEventListener('click', ()=> albumInput.click());
    albumStrip.appendChild(addBtn);
  }
}
albumInput.addEventListener('change', async ()=>{
  const file = albumInput.files[0];
  if(!file) return;
  const arr = getAlbum();
  if(arr.length >= MAX_PHOTOS){ alert(`사진은 최대 ${MAX_PHOTOS}장까지만 등록할 수 있어요`); return; }
  const dataUrl = await compressImage(file, 700, 0.72);
  arr.push(dataUrl);
  setAlbum(arr);
  renderAlbum();
  albumInput.value = '';
});

/* ---------- dynamic info blocks ---------- */
const DEFAULT_BLOCKS = [
  {icon:'🌸', label:'좋아하는 것', value:'만들기, 문구류'},
  {icon:'💭', label:'요즘 관심사', value:'웹앱 만들기'},
  {icon:'✍️', label:'한 줄 소개', value:'천천히, 그렇지만 꾸준히'}
];
const infoContainer = document.getElementById('infoBlocksContainer');
function getBlocks(){ return store.get('wh_infoBlocks', DEFAULT_BLOCKS); }
function setBlocks(arr){ store.set('wh_infoBlocks', arr); }

function renderBlocks(){
  const blocks = getBlocks();
  infoContainer.innerHTML = '';
  blocks.forEach((b, idx)=>{
    const div = document.createElement('div');
    div.className = 'info-block';
    div.innerHTML = `
      <div class="icon icon-c${idx % 4}" title="탭해서 아이콘 바꾸기">${b.icon}</div>
      <div class="body">
        <div class="label" contenteditable="${editMode ? 'true' : 'false'}"></div>
        <div class="value" contenteditable="${editMode ? 'true' : 'false'}"></div>
      </div>
      <div class="block-controls">
        <button class="block-up" title="위로" ${idx === 0 ? 'disabled' : ''}>▲</button>
        <button class="block-down" title="아래로" ${idx === blocks.length - 1 ? 'disabled' : ''}>▼</button>
        <button class="block-del" title="삭제">✕</button>
      </div>
    `;
    div.querySelector('.label').textContent = b.label;
    div.querySelector('.value').textContent = b.value;

    div.querySelector('.icon').addEventListener('click', ()=>{
      if(!editMode) return;
      const arr = getBlocks();
      const newIcon = prompt('아이콘으로 쓸 이모지를 입력하세요', arr[idx].icon);
      if(!newIcon) return;
      arr[idx].icon = newIcon;
      setBlocks(arr);
      renderBlocks();
    });
    div.querySelector('.label').addEventListener('blur', (e)=>{
      const arr = getBlocks();
      arr[idx].label = e.target.textContent;
      setBlocks(arr);
    });
    div.querySelector('.value').addEventListener('blur', (e)=>{
      const arr = getBlocks();
      arr[idx].value = e.target.textContent;
      setBlocks(arr);
    });
    div.querySelector('.block-up').addEventListener('click', ()=>{
      const arr = getBlocks();
      if(idx === 0) return;
      [arr[idx-1], arr[idx]] = [arr[idx], arr[idx-1]];
      setBlocks(arr);
      renderBlocks();
    });
    div.querySelector('.block-down').addEventListener('click', ()=>{
      const arr = getBlocks();
      if(idx === arr.length - 1) return;
      [arr[idx+1], arr[idx]] = [arr[idx], arr[idx+1]];
      setBlocks(arr);
      renderBlocks();
    });
    div.querySelector('.block-del').addEventListener('click', ()=>{
      const arr = getBlocks();
      arr.splice(idx,1);
      setBlocks(arr);
      renderBlocks();
    });
    infoContainer.appendChild(div);
  });
}
document.getElementById('addBlockBtn').addEventListener('click', ()=>{
  const label = prompt('항목 이름을 입력하세요 (예: 좋아하는 계절)');
  if(!label) return;
  const icon = prompt('아이콘으로 쓸 이모지를 입력하세요', '🌿') || '🌿';
  const arr = getBlocks();
  arr.push({icon, label, value:'내용을 입력해주세요'});
  setBlocks(arr);
  renderBlocks();
});

/* ---------- music ---------- */
const musicFrame = document.getElementById('musicFrame');
function extractYoutubeId(url){
  const m = url.match(/(?:youtu\.be\/|v=|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function loadMusic(){
  const savedId = store.get('wh_musicId', null);
  if(savedId) musicFrame.src = `https://www.youtube.com/embed/${savedId}`;
}
document.getElementById('musicBtn').addEventListener('click', ()=>{
  const url = prompt('유튜브 링크를 붙여넣어주세요 🎵');
  if(!url) return;
  const id = extractYoutubeId(url);
  if(!id){ alert('유튜브 링크를 확인해주세요!'); return; }
  musicFrame.src = `https://www.youtube.com/embed/${id}`;
  store.set('wh_musicId', id);
});

/* ---------- links ---------- */
const linkGrid = document.getElementById('linkGrid');
const defaultLinks = [
  {emoji:'📓', label:'노션', url:'https://notion.so'},
  {emoji:'📸', label:'인스타', url:'https://instagram.com'},
  {emoji:'📚', label:'도서관', url:'#'}
];
function getLinks(){ return store.get('wh_links', defaultLinks); }
function setLinks(links){ store.set('wh_links', links); }
function renderLinks(){
  const links = getLinks();
  linkGrid.innerHTML = '';
  links.forEach((link, idx)=>{
    const a = document.createElement('a');
    a.className = 'link-chip';
    a.href = link.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = `
      <button class="link-del" title="삭제">✕</button>
      <span class="link-emoji">${link.emoji}</span>
      <span>${link.label}</span>
    `;
    a.querySelector('.link-del').addEventListener('click', (e)=>{
      e.preventDefault(); e.stopPropagation();
      const arr = getLinks();
      arr.splice(idx,1);
      setLinks(arr);
      renderLinks();
    });
    linkGrid.appendChild(a);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'link-chip link-add';
  addBtn.innerHTML = `<span class="link-emoji">➕</span><span>추가</span>`;
  addBtn.addEventListener('click', ()=>{
    const emoji = prompt('아이콘으로 쓸 이모지를 입력하세요 (예: 🎨)', '🔗') || '🔗';
    const label = prompt('이름을 입력하세요 (예: 인스타그램)');
    if(!label) return;
    const url = prompt('링크 주소를 입력하세요 (https:// 포함)');
    if(!url) return;
    const arr = getLinks();
    arr.push({emoji, label, url});
    setLinks(arr);
    renderLinks();
  });
  linkGrid.appendChild(addBtn);
}

/* ---------- scroll reveal ---------- */
function setupReveal(){
  const items = document.querySelectorAll('.reveal');
  if(!('IntersectionObserver' in window)){
    items.forEach(el=> el.classList.add('in-view'));
    return;
  }
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('in-view');
        io.unobserve(entry.target);
      }
    });
  }, { threshold:0.12 });
  items.forEach(el=> io.observe(el));
}

/* ---------- hydrate ---------- */
function hydrateUI(){
  editables.forEach(id=>{
    const el = document.getElementById(id);
    const saved = store.get('wh_'+id, null);
    if(saved !== null) el.textContent = saved;
  });
  loadAvatar();
  loadMusic();
  renderLinks();
  renderBlocks();
  renderAlbum();
}
hydrateUI();
startCloudSync();
setupReveal();
</script>
