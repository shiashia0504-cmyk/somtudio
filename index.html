<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMtudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#fff7f0;
    --bg-2:#f1e9fb;
    --card:#ffffff;
    --coral:#ffb2a6;
    --coral-deep:#ff9587;
    --lavender:#c9b6ec;
    --lavender-deep:#ab8fe0;
    --mint:#aee3d3;
    --mint-deep:#7dd0b7;
    --yellow:#ffe29a;
    --text-main:#5b4b4e;
    --text-sub:#a4949a;
    --line:#f0e4ea;
    --shadow: 0 8px 24px rgba(91,75,78,0.10);
    --shadow-soft: 0 4px 14px rgba(91,75,78,0.08);
    --radius: 26px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'Noto Sans KR', sans-serif;
    color:var(--text-main);
    background:
      radial-gradient(circle at 15% 10%, var(--bg-2), transparent 45%),
      radial-gradient(circle at 85% 90%, var(--bg-2), transparent 45%),
      var(--bg-1);
    overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .blob{
    position:fixed;
    border-radius:50%;
    filter:blur(2px);
    opacity:0.5;
    z-index:0;
    animation:float 14s ease-in-out infinite;
  }
  .blob1{width:180px;height:180px;background:var(--coral);top:-60px;left:-60px;animation-delay:0s;}
  .blob2{width:140px;height:140px;background:var(--mint);bottom:10%;right:-50px;animation-delay:3s;}
  .blob3{width:90px;height:90px;background:var(--yellow);top:40%;left:-40px;animation-delay:6s;}
  .blob4{width:110px;height:110px;background:var(--lavender);bottom:-40px;right:20%;animation-delay:2s;}
  @keyframes float{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-22px) rotate(8deg);}
  }
  @media (prefers-reduced-motion: reduce){
    .blob{animation:none;}
  }

  .wrap{
    position:relative;
    z-index:1;
    max-width:760px;
    margin:0 auto;
    padding:28px 20px 60px;
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .site-title{
    font-family:'Gaegu', sans-serif;
    font-size:30px;
    font-weight:700;
    color:var(--text-main);
    outline:none;
  }
  .date-badge{
    font-size:12px;
    color:var(--text-sub);
    background:var(--card);
    padding:6px 12px;
    border-radius:20px;
    box-shadow:var(--shadow-soft);
    white-space:nowrap;
  }
  .sync-status{
    font-size:13px;
    background:var(--card);
    width:32px;height:32px;
    display:flex;align-items:center;justify-content:center;
    border-radius:50%;
    box-shadow:var(--shadow-soft);
    margin-right:8px;
    transition:opacity .2s ease;
  }
  .sync-status.syncing{opacity:0.5;}
  .edit-toggle{
    border:none;
    background:var(--card);
    width:38px;height:38px;
    border-radius:50%;
    box-shadow:var(--shadow-soft);
    font-size:16px;
    cursor:pointer;
    margin-left:8px;
    transition:transform .15s ease;
  }
  .edit-toggle:hover{transform:scale(1.08) rotate(-8deg);}
  .header-right{display:flex;align-items:center;}

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
  }
  @media (max-width:640px){
    .grid{grid-template-columns:1fr;}
    .site-title{font-size:24px;}
  }

  .card{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:20px;
    position:relative;
  }
  .card-title{
    font-family:'Gaegu', sans-serif;
    font-size:19px;
    font-weight:700;
    margin:0 0 12px 0;
    display:flex;
    align-items:center;
    gap:6px;
  }

  /* ---------- Profile flip card ---------- */
  .profile-outer{
    grid-column:span 1;
    perspective:1200px;
    padding:0;
    background:none;
    box-shadow:none;
    min-height:290px;
  }
  .flip-inner{
    position:relative;
    width:100%;
    height:100%;
    min-height:290px;
    transition:transform .7s cubic-bezier(.22,1,.36,1);
    transform-style:preserve-3d;
  }
  .flipped .flip-inner{transform:rotateY(180deg);}
  .flip-face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:22px 18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  .flip-back{
    transform:rotateY(180deg);
    text-align:left;
    align-items:flex-start;
    justify-content:center;
  }
  .avatar{
    width:92px;height:92px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--coral),var(--lavender));
    display:flex;align-items:center;justify-content:center;
    font-size:34px;
    color:#fff;
    margin-bottom:14px;
    cursor:pointer;
    background-size:cover;
    background-position:center;
    border:4px solid #fff;
    box-shadow:var(--shadow-soft);
    overflow:hidden;
  }
  .profile-name{
    font-family:'Gaegu', sans-serif;
    font-size:22px;
    font-weight:700;
    outline:none;
  }
  .profile-tag{
    font-size:12px;
    color:#fff;
    background:var(--coral-deep);
    padding:4px 12px;
    border-radius:20px;
    margin:8px 0 10px;
    outline:none;
    display:inline-block;
  }
  .profile-intro{
    font-size:13px;
    color:var(--text-sub);
    line-height:1.6;
    outline:none;
    max-width:220px;
  }
  .flip-btn{
    position:absolute;
    bottom:14px; right:14px;
    border:none;
    background:var(--bg-2);
    width:32px;height:32px;
    border-radius:50%;
    font-size:14px;
    cursor:pointer;
    z-index:2;
  }
  .info-row{
    display:flex;
    gap:8px;
    width:100%;
    padding:6px 0;
    border-bottom:1px dashed var(--line);
    font-size:13px;
  }
  .info-label{
    color:var(--lavender-deep);
    font-weight:700;
    min-width:70px;
    flex-shrink:0;
  }
  .info-value{flex:1;outline:none;}
  .quote{
    margin-top:12px;
    font-family:'Gaegu', sans-serif;
    font-size:15px;
    color:var(--text-sub);
    outline:none;
  }

  /* ---------- Music card ---------- */
  .music-frame{
    border-radius:16px;
    overflow:hidden;
    box-shadow:var(--shadow-soft);
  }
  .music-frame iframe{display:block;width:100%;height:160px;border:none;}
  .music-btn{
    margin-top:10px;
    width:100%;
    border:none;
    background:var(--bg-2);
    color:var(--text-main);
    padding:9px;
    border-radius:14px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
  }

  /* ---------- Todo card ---------- */
  .tabs{display:flex;gap:6px;margin-bottom:10px;}
  .tab-btn{
    border:none;
    padding:6px 14px;
    border-radius:16px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    background:var(--bg-2);
    color:var(--text-sub);
  }
  .tab-btn.active{background:var(--mint-deep);color:#fff;}
  .todo-input-row{display:flex;gap:6px;margin-bottom:10px;}
  .todo-input-row input{
    flex:1;
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:8px 12px;
    font-size:13px;
    font-family:inherit;
    outline:none;
  }
  .todo-input-row input:focus{border-color:var(--mint-deep);}
  .todo-input-row button{
    border:none;background:var(--mint-deep);color:#fff;
    width:34px;border-radius:12px;font-size:16px;cursor:pointer;
  }
  .todo-list{list-style:none;margin:0;padding:0;max-height:200px;overflow-y:auto;}
  .todo-item{
    display:flex;align-items:center;gap:8px;
    padding:7px 2px;
    border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .todo-item input[type=checkbox]{
    accent-color:var(--mint-deep);
    width:16px;height:16px;flex-shrink:0;cursor:pointer;
  }
  .todo-text{flex:1;word-break:break-word;}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--text-sub);}
  .todo-del{
    border:none;background:none;color:var(--text-sub);
    cursor:pointer;font-size:14px;opacity:0;transition:opacity .15s;
  }
  .todo-item:hover .todo-del{opacity:1;}
  .empty-hint{color:var(--text-sub);font-size:12px;padding:10px 2px;}

  /* ---------- Links card ---------- */
  .link-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .link-chip{
    position:relative;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    background:var(--bg-1);
    border:1.5px solid var(--line);
    border-radius:16px;
    padding:12px 6px;
    text-decoration:none;
    color:var(--text-main);
    font-size:11px;
    font-weight:700;
    text-align:center;
    cursor:pointer;
    transition:transform .12s ease;
  }
  .link-chip:hover{transform:translateY(-2px);border-color:var(--coral);}
  .link-emoji{font-size:22px;}
  .link-del{
    position:absolute;top:2px;right:4px;
    border:none;background:none;font-size:11px;color:var(--text-sub);
    cursor:pointer;display:none;
  }
  body.edit-mode .link-del{display:block;}
  .link-add{
    border:1.5px dashed var(--line);
    background:none;
    color:var(--text-sub);
    display:none;
  }
  body.edit-mode .link-add{display:flex;}

  body.edit-mode [contenteditable="true"]{
    outline:1.5px dashed var(--coral);
    outline-offset:3px;
    border-radius:6px;
    background:rgba(255,178,166,0.06);
  }
  body.edit-mode .avatar::after{
    content:'📷';
    position:absolute;
  }

  footer{
    text-align:center;
    font-size:11px;
    color:var(--text-sub);
    margin-top:24px;
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="blob blob4"></div>

<div class="wrap">

  <header>
    <div class="site-title" contenteditable="false" id="siteTitle">내 작은 방 🌿</div>
    <div class="header-right">
      <div class="sync-status" id="syncStatus" title="동기화 상태">☁️</div>
      <div class="date-badge" id="dateBadge"></div>
      <button class="edit-toggle" id="editToggle" title="편집 모드">✏️</button>

  <div class="grid">

    <div class="card profile-outer" id="profileOuter">

          <div class="profile-intro" contenteditable="false" id="profileIntro">오늘도 도서관에서 책과 함께 하루를 보내는 중 🌿</div>
          <button class="flip-btn" id="flipBtn1" title="뒤집기">🔄</button>
        </div>
        <div class="flip-face flip-back">
          <div class="card-title" style="font-size:15px;">ABOUT ME</div>
          <div class="info-row"><div class="info-label">좋아하는 것</div><div class="info-value" contenteditable="false" id="info1">만들기, 문구류</div></div>
          <div class="info-row"><div class="info-label">요즘 관심사</div><div class="info-value" contenteditable="false" id="info2">웹앱 만들기</div></div>
          <div class="info-row"><div class="info-label">한 줄 소개</div><div class="info-value" contenteditable="false" id="info3">천천히, 그렇지만 꾸준히</div></div>
          <div class="quote" contenteditable="false" id="quote">"오늘도 잘 살아냈다 🤍"</div>
          <button class="flip-btn" id="flipBtn2" title="뒤집기">🔄</button>
        </div>
      </div>
    </div>

    <!-- Music player -->
    <div class="card">
      <div class="card-title">🎵 지금 듣는 노래</div>
      <div class="music-frame">
        <iframe id="musicFrame" src="https://www.youtube.com/embed/jfKfPfyJRdk" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
      <button class="music-btn" id="musicBtn">🎶 노래 바꾸기</button>
    </div>

    <!-- Todo / wishlist -->
    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" data-list="todo">오늘 할 일</button>
        <button class="tab-btn" data-list="wish">위시리스트</button>
      </div>
      <div class="todo-input-row">
        <input type="text" id="todoInput" placeholder="추가하고 엔터 ⏎">
        <button id="todoAddBtn">+</button>
      </div>
      <ul class="todo-list" id="todoList"></ul>
    </div>

    <!-- Links -->
    <div class="card">
      <div class="card-title">🔗 자주 가는 곳</div>
      <div class="link-grid" id="linkGrid"></div>
    </div>

  </div>

  <footer>edit 모드(✏️)를 눌러서 자유롭게 커스텀해보세요 · made with 🤍</footer>
</div>

<!-- Firebase (compat SDK, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* ==========================================================
   🔥 여기에 본인의 Firebase 설정값을 붙여넣어주세요
   Firebase 콘솔 > 프로젝트 설정 > 일반 > 내 앱 > SDK 설정 및 구성
   ========================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyAP4dInezoBrbUF7p0r1aP80pqcclg0EgQ",
  authDomain: "sometudio.firebaseapp.com",
  databaseURL: "https://sometudio-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sometudio",
  storageBucket: "sometudio.firebasestorage.app",
  messagingSenderId: "861527247257",
  appId: "1:861527247257:web:88cee094a9082eee12ab08"
};

/* 이 문서 하나에 대시보드 전체 데이터가 저장됩니다.
   기기가 여러 개여도 같은 DOC_ID면 자동으로 같은 데이터를 봅니다. */
const DOC_ID = "shasha";

let db = null;
let docRef = null;
let isFirebaseReady = false;

try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  docRef = db.collection('webhub').doc(DOC_ID);
  isFirebaseReady = true;
}catch(e){
  console.warn('Firebase 설정이 비어있어요. 브라우저 저장(localStorage)만 사용합니다.', e);
}

const syncStatusEl = document.getElementById('syncStatus');
function setSyncStatus(state){
  if(!syncStatusEl) return;
  if(state === 'syncing'){ syncStatusEl.textContent = '☁️'; syncStatusEl.classList.add('syncing'); syncStatusEl.title = '저장 중...'; }
  else if(state === 'synced'){ syncStatusEl.textContent = '☁️'; syncStatusEl.classList.remove('syncing'); syncStatusEl.title = '동기화됨'; }
  else if(state === 'offline'){ syncStatusEl.textContent = '📴'; syncStatusEl.classList.remove('syncing'); syncStatusEl.title = 'Firebase 미설정 - 이 기기에만 저장됨'; }
  else if(state === 'error'){ syncStatusEl.textContent = '⚠️'; syncStatusEl.classList.remove('syncing'); syncStatusEl.title = '동기화 오류'; }
}
setSyncStatus(isFirebaseReady ? 'synced' : 'offline');

/* ---------- storage helpers ---------- */
let syncTimer = null;
let applyingRemote = false; // guard against feedback loop while hydrating from a snapshot

const store = {
  get(key, fallback){
    try{
      const v = localStorage.getItem(key);
      return v === null ? fallback : JSON.parse(v);
    }catch(e){ return fallback; }
  },
  set(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
    if(!applyingRemote) queueCloudSave(key, val);
  }
};

function queueCloudSave(key, val){
  if(!isFirebaseReady) return;
  setSyncStatus('syncing');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>{
    docRef.set({ [key]: val }, { merge:true })
      .then(()=> setSyncStatus('synced'))
      .catch(err=>{ console.error(err); setSyncStatus('error'); });
  }, 500);
}

function startCloudSync(){
  if(!isFirebaseReady) return;
  docRef.onSnapshot((snap)=>{
    if(!snap.exists) return;
    if(snap.metadata.hasPendingWrites) return; // ignore echo of our own writes
    applyingRemote = true;
    const data = snap.data();
    Object.keys(data).forEach(k=>{
      try{ localStorage.setItem(k, JSON.stringify(data[k])); }catch(e){}
    });
    hydrateUI();
    applyingRemote = false;
    setSyncStatus('synced');
  }, (err)=>{
    console.error(err);
    setSyncStatus('error');
  });
}

/* ---------- date badge ---------- */
document.getElementById('dateBadge').textContent = new Date().toLocaleDateString('ko-KR', {
  month:'long', day:'numeric', weekday:'short'
});

/* ---------- edit mode ---------- */
const editables = ['siteTitle','profileName','profileTag','profileIntro','info1','info2','info3','quote'];
const editToggle = document.getElementById('editToggle');
let editMode = false;

function applyEditState(){
  document.body.classList.toggle('edit-mode', editMode);
  editables.forEach(id=>{
    document.getElementById(id).setAttribute('contenteditable', editMode ? 'true' : 'false');
  });
  editToggle.textContent = editMode ? '✅' : '✏️';
}
editToggle.addEventListener('click', ()=>{
  editMode = !editMode;
  applyEditState();
});
editables.forEach(id=>{
  const el = document.getElementById(id);
  el.addEventListener('blur', ()=> store.set('wh_'+id, el.textContent));
});
/* ---------- flip card ---------- */
const profileOuter = document.getElementById('profileOuter');
function doFlip(e){
  e.stopPropagation();
  profileOuter.classList.toggle('flipped');
}
document.getElementById('flipBtn1').addEventListener('click', doFlip);
document.getElementById('flipBtn2').addEventListener('click', doFlip);

/* ---------- avatar photo ---------- */
const avatar = document.getElementById('avatar');
const avatarInput = document.getElementById('avatarInput');
function loadAvatar(){
  const saved = store.get('wh_avatar', null);
  if(saved){
    avatar.style.backgroundImage = `url(${saved})`;
    avatar.textContent = '';
  }
}
avatar.addEventListener('click', ()=>{
  if(!editMode) return;
  avatarInput.click();
});
avatarInput.addEventListener('change', ()=>{
  const file = avatarInput.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    avatar.style.backgroundImage = `url(${reader.result})`;
    avatar.textContent = '';
    store.set('wh_avatar', reader.result);
  };
  reader.readAsDataURL(file);
});

/* ---------- music ---------- */
const musicFrame = document.getElementById('musicFrame');
function extractYoutubeId(url){
  const m = url.match(/(?:youtu\.be\/|v=|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function loadMusic(){
  const savedId = store.get('wh_musicId', null);
  if(savedId) musicFrame.src = `https://www.youtube.com/embed/${savedId}`;
}
document.getElementById('musicBtn').addEventListener('click', ()=>{
  const url = prompt('유튜브 링크를 붙여넣어주세요 🎵');
  if(!url) return;
  const id = extractYoutubeId(url);
  if(!id){ alert('유튜브 링크를 확인해주세요!'); return; }
  musicFrame.src = `https://www.youtube.com/embed/${id}`;
  store.set('wh_musicId', id);
});

/* ---------- todo / wishlist ---------- */
let currentList = 'todo';
const todoListEl = document.getElementById('todoList');
const todoInput = document.getElementById('todoInput');
const tabBtns = document.querySelectorAll('.tab-btn');

function getItems(listName){ return store.get('wh_list_'+listName, []); }
function setItems(listName, items){ store.set('wh_list_'+listName, items); }

function renderList(){
  const items = getItems(currentList);
  todoListEl.innerHTML = '';
  if(items.length === 0){
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.textContent = currentList === 'todo' ? '오늘 할 일을 추가해보세요 🌱' : '갖고 싶은 걸 적어보세요 ✨';
    todoListEl.appendChild(hint);
    return;
  }
  items.forEach((item, idx)=>{
    const li = document.createElement('li');
    li.className = 'todo-item' + (item.done ? ' done' : '');
    li.innerHTML = `
      <input type="checkbox" ${item.done ? 'checked' : ''}>
      <span class="todo-text"></span>
      <button class="todo-del" title="삭제">✕</button>
    `;
    li.querySelector('.todo-text').textContent = item.text;
    li.querySelector('input[type=checkbox]').addEventListener('change', ()=>{
      const arr = getItems(currentList);
      arr[idx].done = !arr[idx].done;
      setItems(currentList, arr);
      renderList();
    });
    li.querySelector('.todo-del').addEventListener('click', ()=>{
      const arr = getItems(currentList);
      arr.splice(idx,1);
      setItems(currentList, arr);
      renderList();
    });
    todoListEl.appendChild(li);
  });
}
function addItem(){
  const text = todoInput.value.trim();
  if(!text) return;
  const arr = getItems(currentList);
  arr.push({text, done:false});
  setItems(currentList, arr);
  todoInput.value = '';
  renderList();
}
document.getElementById('todoAddBtn').addEventListener('click', addItem);
todoInput.addEventListener('keydown', e=>{ if(e.key === 'Enter') addItem(); });
tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentList = btn.dataset.list;
    renderList();
  });
});

/* ---------- links ---------- */
const linkGrid = document.getElementById('linkGrid');
const defaultLinks = [
  {emoji:'📓', label:'노션', url:'https://notion.so'},
  {emoji:'📸', label:'인스타', url:'https://instagram.com'},
  {emoji:'📚', label:'도서관', url:'#'}
];
function getLinks(){ return store.get('wh_links', defaultLinks); }
function setLinks(links){ store.set('wh_links', links); }

function renderLinks(){
  const links = getLinks();
  linkGrid.innerHTML = '';
  links.forEach((link, idx)=>{
    const a = document.createElement('a');
    a.className = 'link-chip';
    a.href = link.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = `
      <button class="link-del" title="삭제">✕</button>
      <span class="link-emoji">${link.emoji}</span>
      <span>${link.label}</span>
    `;
    a.querySelector('.link-del').addEventListener('click', (e)=>{
      e.preventDefault(); e.stopPropagation();
      const arr = getLinks();
      arr.splice(idx,1);
      setLinks(arr);
      renderLinks();
    });
    linkGrid.appendChild(a);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'link-chip link-add';
  addBtn.innerHTML = `<span class="link-emoji">➕</span><span>추가</span>`;
  addBtn.addEventListener('click', ()=>{
    const emoji = prompt('아이콘으로 쓸 이모지를 입력하세요 (예: 🎨)', '🔗') || '🔗';
    const label = prompt('이름을 입력하세요 (예: 인스타그램)');
    if(!label) return;
    const url = prompt('링크 주소를 입력하세요 (https:// 포함)');
    if(!url) return;
    const arr = getLinks();
    arr.push({emoji, label, url});
    setLinks(arr);
    renderLinks();
  });
  linkGrid.appendChild(addBtn);
}

/* ---------- hydrate everything from current storage ---------- */
function hydrateUI(){
  editables.forEach(id=>{
    const el = document.getElementById(id);
    const saved = store.get('wh_'+id, null);
    if(saved !== null) el.textContent = saved;
  });
  loadAvatar();
  loadMusic();
  renderList();
  renderLinks();
}

hydrateUI();
startCloudSync();
</script>
